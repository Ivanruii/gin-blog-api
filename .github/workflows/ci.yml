name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  schedule:
    - cron: "0 3 * * 1"
  repository_dispatch:
    types: [ci-custom-trigger]
  workflow_dispatch:
    inputs:
      go_version:
        description: "Versión de Go a utilizar"
        required: false
        default: "1.25"
        type: string
      test_race:
        description: "Ejecutar tests con -race"
        required: false
        default: true
        type: boolean
      run_vuln:
        description: "Ejecutar chequeo de vulnerabilidades"
        required: false
        default: true
        type: boolean

env:
  GO_VERSION: ${{ github.event.inputs.go_version || '1.25' }}
  TEST_RACE: ${{ github.event.inputs.test_race || 'true' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Install golangci-lint
        run: GOTOOLCHAIN=auto go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run ./...

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: |
          if [ "${TEST_RACE}" = "true" ]; then
            go test -v -race -coverprofile=coverage.out ./...
          else
            go test -v -coverprofile=coverage.out ./...
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  vuln:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_vuln != 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: make build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gin-blog-api
          path: bin/blog-api
