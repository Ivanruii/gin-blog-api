name: Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  publish-images:
    name: Publish Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: alpine
            dockerfile: deployments/Dockerfile
          - variant: debian
            dockerfile: deployments/Dockerfile.debian
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: image-tags
        env:
          BRANCH_NAME: ${{ github.event.workflow_run.head_branch }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          image_name="${GITHUB_REPOSITORY#*/}"
          image_repo="${{ secrets.DOCKERHUB_USERNAME }}/${image_name,,}"
          tags="${image_repo}:${{ matrix.variant }}-${COMMIT_SHA},${image_repo}:${{ matrix.variant }}-${BRANCH_NAME}"
          if [ "${BRANCH_NAME}" = "main" ]; then
            tags="${tags},${image_repo}:${{ matrix.variant }}-latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build image for ClamAV scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: gin-blog-api-scan:${{ matrix.variant }}

      - name: Install ClamAV
        run: sudo apt-get update && sudo apt-get install -y clamav

      - name: Update ClamAV signatures
        run: sudo freshclam

      - name: Scan image filesystem with ClamAV
        env:
          SCAN_IMAGE: gin-blog-api-scan:${{ matrix.variant }}
        run: |
          set -euo pipefail
          scan_container="clamav-scan-${{ matrix.variant }}"
          scan_dir="$(mktemp -d)"

          docker create --name "${scan_container}" "${SCAN_IMAGE}" >/dev/null
          docker export "${scan_container}" | tar -xf - -C "${scan_dir}"
          docker rm "${scan_container}" >/dev/null

          clamscan -r --infected --max-filesize=200M --max-scansize=1024M "${scan_dir}"
          rm -rf "${scan_dir}"

      - name: Build and push ${{ matrix.variant }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
